[pytest]
# Configuración de pytest para el proyecto
# Tarea 5.1 - Testing Automatizado

# Directorio de tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py *_test.py

# Patrón de clases de test
python_classes = Test* *Tests

# Patrón de funciones de test
python_functions = test_*

# Marcadores personalizados
markers =
    unit: Tests unitarios (funciones individuales)
    integration: Tests de integración (múltiples componentes)
    e2e: Tests end-to-end (flujo completo)
    slow: Tests lentos que pueden saltarse en desarrollo
    smoke: Tests básicos de funcionalidad crítica
    security: Tests de seguridad
    performance: Tests de rendimiento

# Opciones por defecto
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70

# Configuración de asyncio
asyncio_mode = auto

# Ignorar warnings específicos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
